<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      const path = window.location.pathname;
      
      const repoName = '/НАЗВАНИЕ_РЕПО';
      let newPath = path;
      
      if (path.startsWith(repoName)) {
        newPath = path.substring(repoName.length);
      }
      
      window.location.href = repoName + '/#' + newPath;
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
